  <style>
    :root {
      --surface: #ffffff;
      --surface-soft: #f5f7f8;
      --line: #cfd7dd;
      --text: #172026;
      --muted: #5f6f7a;
      --active: #165a72;
      --route: #dc2626;
    }

    * { box-sizing: border-box; }

    html,
    body {
      height: 100%;
      margin: 0;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      background: var(--surface-soft);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
      z-index: 1000;
    }

    .title-block { min-width: 240px; }

    h1 {
      margin: 0;
      font-size: 17px;
      font-weight: 700;
      line-height: 1.2;
    }

    .control-strip {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .segmented {
      display: inline-grid;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      overflow: hidden;
      background: var(--surface);
    }

    .destination-toggle { grid-template-columns: repeat(3, minmax(128px, 1fr)); }
    .date-toggle { grid-template-columns: repeat(6, minmax(86px, 1fr)); }

    .segmented button {
      min-width: 0;
      padding: 8px 12px;
      border: 0;
      border-right: 1px solid var(--line);
      color: var(--text);
      background: transparent;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
    }

    .segmented button:last-child { border-right: 0; }
    .segmented button:hover { background: #eef3f5; }
    .segmented button.active { color: #ffffff; background: var(--active); }

    #map {
      flex: 1 1 auto;
      width: 100%;
      height: calc(100vh - 59px);
      min-height: 360px;
    }

    .legend-box {
      background: white;
      padding: 10px 12px;
      border-radius: 7px;
      box-shadow: 0 6px 18px rgba(23, 32, 38, 0.14);
      font-size: 13px;
      line-height: 1.45;
    }

    .legend-title {
      font-weight: 700;
      margin-bottom: 6px;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 5px 0;
    }

    .swatch-line {
      width: 34px;
      height: 0;
      border-top: 4px solid var(--route);
      display: inline-block;
    }

    @media (max-width: 980px) {
      .toolbar { align-items: stretch; flex-direction: column; gap: 9px; }
      .control-strip { justify-content: stretch; }
      .segmented { width: 100%; }
      .destination-toggle { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .date-toggle { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .segmented button { padding-inline: 6px; font-size: 12px; }
      #map { height: calc(100vh - 151px); }
    }
  </style>
