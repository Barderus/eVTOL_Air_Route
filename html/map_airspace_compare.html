<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chicago Class B Shelf Comparison</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.6.0/dist/leaflet.css"
    integrity="sha512-xwE/Az9zrjBIphAcBb3F6JVqxf46+CDLwfLMHloNu6KEQCAWi6HcDUbeOfBIptF7tcCzusKFjFw2yuvEpDL9wQ=="
    crossorigin=""
  />

  <style>
    :root {
      color-scheme: light;
      --surface: #ffffff;
      --surface-soft: #f5f7f8;
      --line: #cfd7dd;
      --text: #172026;
      --muted: #5f6f7a;
      --active: #165a72;
      --low: #2ca25f;
      --medium-air: #f1c40f;
      --high-air: #b30000;
      --medium-pop: #6baed6;
      --high-pop: #08306b;
      --nofly: #111111;
      --model-ring: #7c3aed;
      --faa-surface: #9f1239;
      --faa-shelf: #ea580c;
      --faa-lake: #0284c7;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      background: var(--surface-soft);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
      z-index: 1000;
    }

    .title-block {
      min-width: 220px;
    }

    h1 {
      margin: 0;
      font-size: 17px;
      font-weight: 700;
      line-height: 1.2;
    }

    .status {
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
      white-space: nowrap;
    }

    .segmented {
      display: inline-grid;
      grid-template-columns: repeat(3, minmax(108px, 1fr));
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      overflow: hidden;
      background: var(--surface);
    }

    .segmented button {
      min-width: 0;
      padding: 8px 12px;
      border: 0;
      border-right: 1px solid var(--line);
      color: var(--text);
      background: transparent;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
    }

    .segmented button:last-child {
      border-right: 0;
    }

    .segmented button:hover {
      background: #eef3f5;
    }

    .segmented button.active {
      color: #ffffff;
      background: var(--active);
    }

    #map {
      flex: 1 1 auto;
      width: 100%;
      height: calc(100vh - 59px);
      min-height: 360px;
    }

    .leaflet-container {
      background: #edf1f2;
    }

    .legend-box,
    .info-box,
    .error-box {
      padding: 10px 12px;
      border: 1px solid rgba(23, 32, 38, 0.15);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 6px 18px rgba(23, 32, 38, 0.14);
      color: var(--text);
      font-size: 12px;
      line-height: 1.35;
    }

    .legend-title,
    .info-title {
      margin-bottom: 7px;
      font-weight: 700;
    }

    .legend-row {
      display: grid;
      grid-template-columns: 14px auto;
      align-items: center;
      gap: 7px;
      margin: 5px 0;
      white-space: nowrap;
    }

    .swatch {
      width: 14px;
      height: 14px;
      border: 1px solid rgba(23, 32, 38, 0.28);
    }

    .popup-grid {
      display: grid;
      grid-template-columns: auto auto;
      gap: 3px 12px;
      min-width: 190px;
    }

    .popup-grid dt {
      color: var(--muted);
      font-weight: 600;
    }

    .popup-grid dd {
      margin: 0;
      text-align: right;
    }

    .ring-label {
      padding: 3px 7px;
      border: 1px solid rgba(23, 32, 38, 0.16);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 4px 10px rgba(23, 32, 38, 0.12);
      color: var(--text);
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
    }

    .info-box {
      max-width: 360px;
    }

    .info-box p {
      margin: 0 0 6px;
    }

    .info-box p:last-child {
      margin-bottom: 0;
    }

    @media (max-width: 720px) {
      .toolbar {
        align-items: stretch;
        flex-direction: column;
        gap: 9px;
      }

      .status {
        white-space: normal;
      }

      .segmented {
        width: 100%;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .segmented button {
        padding-inline: 6px;
        font-size: 12px;
      }

      #map {
        height: calc(100vh - 105px);
      }
    }
  </style>
</head>

<body>
  <header class="toolbar">
    <div class="title-block">
      <h1>Chicago Class B Shelf Comparison</h1>
      <div id="status" class="status">Loading risk grid and layered Class B shelf overlays...</div>
    </div>

    <div class="segmented" role="group" aria-label="Risk layer">
      <button id="btnCombined" class="active" type="button">Combined</button>
      <button id="btnAir" type="button">Airspace</button>
      <button id="btnPop" type="button">Population</button>
    </div>
  </header>

  <main id="map" aria-label="Chicago Class B shelf comparison map"></main>

  <script
    src="https://unpkg.com/leaflet@1.6.0/dist/leaflet.js"
    integrity="sha512-gZwIG9x3wUXg2hdXF6+rVkLF/0Vi9U8D2Ntg4Ga5I5BZpVkVxlJWbSQtXPSiUTtC0TjtGOmxa1AJPuV0CPthew=="
    crossorigin=""
  ></script>

  <script>
    const GRID_URL = "../geojson/risk_grid_v6.geojson";
    const STUDY_BOUNDS = L.latLngBounds(
      [41.48, -88.34],
      [42.21, -87.52]
    );
    const POP_MED_TH = 40;
    const POP_HIGH_TH = 90;
    const AIR_MED_TH = 30;
    const AIR_HIGH_TH = 70;
    const LAB_NO_FLY_RADIUS_M = 3000;
    const METERS_PER_DEG_LAT = 111320;
    const NM_TO_METERS = 1852;

    const labNoFlySites = [
      { name: "Argonne National Lab", lat: 41.7150, lon: -87.9830 },
      { name: "Fermilab", lat: 41.8407, lon: -88.2620 }
    ];

    const airports = [
      { name: "O'Hare International Airport", lat: 41.97807408541273, lon: -87.90902412382081 },
      { name: "Midway International Airport", lat: 41.7856116663475, lon: -87.75331135429448 },
      { name: "Lewis University Airport", lat: 41.60690586957971, lon: -88.09526487573747 },
      { name: "Brookeridge Airpark", lat: 41.73268507397754, lon: -87.9972105460431 }
    ];

    const routeEndpoints = {
      start: { label: "Clow International Airport", lat: 41.695923717435235, lon: -88.12876224517822 },
      end: { label: "Chicago Loop", lat: 41.87838051825937, lon: -87.63905525207521 }
    };

    const faaRef = {
      ordPoo: { label: "Chicago Class B Point of Origin", lat: 41.9877777778, lon: -87.9047222222 },
      mdwLegal: { label: "Chicago Midway Legal Center", lat: 41.7861111111, lon: -87.7525000000 }
    };

    const colors = {
      low: "#2ca25f",
      mediumCombined: "#f4b183",
      highCombined: "#c84c5a",
      mediumAir: "#f1c40f",
      highAir: "#b30000",
      mediumPop: "#6baed6",
      highPop: "#08306b",
      noFly: "#111111"
    };

    const statusEl = document.getElementById("status");
    const map = L.map("map", {
      center: [41.84, -87.93],
      zoom: 10,
      maxBounds: STUDY_BOUNDS.pad(0.04),
      maxBoundsViscosity: 0.9,
      preferCanvas: true,
      zoomControl: true
    });

    L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors &copy; CARTO"
    }).addTo(map);

    const airportIcon = L.icon({
      iconUrl: "../images/icons/airplane.svg",
      iconSize: [30, 30],
      iconAnchor: [15, 30],
      popupAnchor: [0, -28]
    });

    const startIcon = L.icon({
      iconUrl: "../images/icons/rocket.svg",
      iconSize: [28, 28],
      iconAnchor: [14, 28],
      popupAnchor: [0, -26]
    });

    const endIcon = L.icon({
      iconUrl: "../images/icons/flag.svg",
      iconSize: [28, 28],
      iconAnchor: [14, 28],
      popupAnchor: [0, -26]
    });

    const referenceLayer = L.layerGroup([
      L.marker([routeEndpoints.start.lat, routeEndpoints.start.lon], { icon: startIcon })
        .bindPopup(`<b>Start</b><br>${routeEndpoints.start.label}`),
      L.marker([routeEndpoints.end.lat, routeEndpoints.end.lon], { icon: endIcon })
        .bindPopup(`<b>End</b><br>${routeEndpoints.end.label}`),
      L.polyline(
        [
          [routeEndpoints.start.lat, routeEndpoints.start.lon],
          [routeEndpoints.end.lat, routeEndpoints.end.lon]
        ],
        { color: "#46545d", weight: 3, opacity: 0.8, dashArray: "6 6" }
      ).bindPopup("Reference line: Clow to Chicago Loop")
    ]).addTo(map);

    const airportLayer = L.layerGroup(
      airports.map((airport) => (
        L.marker([airport.lat, airport.lon], { icon: airportIcon })
          .bindPopup(`<b>${airport.name}</b>`)
      ))
    ).addTo(map);

    function fmt(value, digits = 1) {
      const number = Number(value);
      return Number.isFinite(number) ? number.toFixed(digits) : "n/a";
    }

    function distanceMeters(lat1, lon1, lat2, lon2) {
      const latMeters = (lat1 - lat2) * METERS_PER_DEG_LAT;
      const lonMeters = (lon1 - lon2) * METERS_PER_DEG_LAT * Math.cos((lat1 + lat2) * Math.PI / 360);
      return Math.hypot(latMeters, lonMeters);
    }

    function collectCoordinates(geometry, coords = []) {
      if (!geometry || !geometry.coordinates) return coords;

      function walk(value) {
        if (!Array.isArray(value)) return;
        if (typeof value[0] === "number" && typeof value[1] === "number") {
          coords.push(value);
          return;
        }
        value.forEach(walk);
      }

      walk(geometry.coordinates);
      return coords;
    }

    function featureCenter(feature) {
      const coords = collectCoordinates(feature.geometry);
      if (!coords.length) return null;

      const sum = coords.reduce((acc, coord) => {
        acc.lon += coord[0];
        acc.lat += coord[1];
        return acc;
      }, { lat: 0, lon: 0 });

      return {
        lat: sum.lat / coords.length,
        lon: sum.lon / coords.length
      };
    }

    function classFromThreshold(value, mediumThreshold, highThreshold) {
      if (value > highThreshold) return "High";
      if (value > mediumThreshold) return "Medium";
      return "Low";
    }

    function riskClassFromCost(riskCost) {
      if (riskCost > 70) return "High";
      if (riskCost > 30) return "Medium";
      return "Low";
    }

    function isLabNoFlyFeature(feature) {
      const p = feature.properties || {};
      const isNoFly = p.density_type === "no-fly" || p.risk_class === "No-Fly";
      if (!isNoFly) return false;

      const center = featureCenter(feature);
      if (!center) return false;

      return labNoFlySites.some((site) => (
        distanceMeters(center.lat, center.lon, site.lat, site.lon) <= LAB_NO_FLY_RADIUS_M + 400
      ));
    }

    function demoteLabNoFlyFeature(feature) {
      const p = feature.properties || {};
      const cityRisk = Number(p.city_risk) || 0;
      const airportRisk = Number(p.airport_risk_combined ?? p.airport_risk) || 0;
      const riskCost = cityRisk + airportRisk;
      const popClass = classFromThreshold(cityRisk, POP_MED_TH, POP_HIGH_TH);
      const airClass = classFromThreshold(airportRisk, AIR_MED_TH, AIR_HIGH_TH);

      let densityType = "low";
      if (popClass !== "Low" || airClass !== "Low") {
        densityType = cityRisk >= airportRisk ? "population" : "airspace";
      }

      feature.properties = {
        ...p,
        risk_cost: riskCost,
        risk_class: riskClassFromCost(riskCost),
        pop_class: popClass,
        air_class: airClass,
        density_type: densityType,
        lab_no_fly_removed: true
      };
    }

    function normalizeGridData(data) {
      let demotedCount = 0;
      for (const feature of data.features || []) {
        if (isLabNoFlyFeature(feature)) {
          demoteLabNoFlyFeature(feature);
          demotedCount += 1;
        }
      }
      return demotedCount;
    }

    function colorCombined(feature) {
      const p = feature.properties || {};
      if (p.density_type === "no-fly" || p.risk_class === "No-Fly") return colors.noFly;
      if (p.risk_class === "High") return colors.highCombined;
      if (p.risk_class === "Medium") return colors.mediumCombined;
      return colors.low;
    }

    function colorAirspace(feature) {
      const p = feature.properties || {};
      if (p.density_type === "no-fly" || p.risk_class === "No-Fly") return colors.noFly;
      if (p.air_class === "High") return colors.highAir;
      if (p.air_class === "Medium") return colors.mediumAir;
      return colors.low;
    }

    function colorPopulation(feature) {
      const p = feature.properties || {};
      if (p.density_type === "no-fly" || p.risk_class === "No-Fly") return colors.noFly;
      if (p.pop_class === "High") return colors.highPop;
      if (p.pop_class === "Medium") return colors.mediumPop;
      return colors.low;
    }

    function gridStyle(colorFn) {
      return function(feature) {
        const color = colorFn(feature);
        return {
          color,
          weight: 0.35,
          opacity: 0.45,
          fillColor: color,
          fillOpacity: 0.58
        };
      };
    }

    function popupHtml(feature) {
      const p = feature.properties || {};
      return `
        <dl class="popup-grid">
          <dt>Risk class</dt><dd>${p.risk_class ?? "n/a"}</dd>
          <dt>Risk cost</dt><dd>${fmt(p.risk_cost)}</dd>
          <dt>Dominant</dt><dd>${p.density_type ?? "n/a"}</dd>
          <dt>Population</dt><dd>${p.pop_class ?? "n/a"}</dd>
          <dt>Airspace</dt><dd>${p.air_class ?? "n/a"}</dd>
          <dt>Pop risk</dt><dd>${fmt(p.city_risk)}</dd>
          <dt>Air risk</dt><dd>${fmt(p.airport_risk_combined ?? p.airport_risk)}</dd>
        </dl>
      `;
    }

    function onEachGridFeature(feature, layer) {
      layer.bindPopup(() => popupHtml(feature), { maxWidth: 280 });
    }

    function makeGridLayer(data, colorFn) {
      return L.geoJSON(data, {
        renderer: L.canvas({ padding: 0.35 }),
        style: gridStyle(colorFn),
        onEachFeature: onEachGridFeature
      });
    }

    function setActiveButton(mode) {
      const buttonMap = {
        combined: document.getElementById("btnCombined"),
        air: document.getElementById("btnAir"),
        pop: document.getElementById("btnPop")
      };

      Object.values(buttonMap).forEach((button) => button.classList.remove("active"));
      buttonMap[mode].classList.add("active");
    }

    let currentMode = "combined";
    let gridLayers = {
      combined: null,
      air: null,
      pop: null
    };

    function showGridLayer(mode) {
      Object.values(gridLayers).forEach((layer) => {
        if (layer && map.hasLayer(layer)) map.removeLayer(layer);
      });

      gridLayers[mode].addTo(map);
      currentMode = mode;
      setActiveButton(mode);
      updateLegend(mode);
    }

    const legend = L.control({ position: "bottomright" });
    legend.onAdd = function() {
      const div = L.DomUtil.create("div", "legend-box");
      div.id = "legend";
      return div;
    };
    legend.addTo(map);

    function legendRows(mode) {
      if (mode === "air") {
        return [
          ["Low airspace risk", colors.low],
          ["Medium airspace risk", colors.mediumAir],
          ["High airspace risk", colors.highAir]
        ];
      }

      if (mode === "pop") {
        return [
          ["Low population risk", colors.low],
          ["Medium population risk", colors.mediumPop],
          ["High population risk", colors.highPop]
        ];
      }

      return [
        ["Low combined risk", colors.low],
        ["Medium combined risk", colors.mediumCombined],
        ["High combined risk", colors.highCombined]
      ];
    }

    function updateLegend(mode) {
      const legendEl = document.getElementById("legend");
      if (!legendEl) return;

      const rows = legendRows(mode).map(([label, color]) => (
        `<div class="legend-row"><span class="swatch" style="background:${color}"></span><span>${label}</span></div>`
      )).join("");

      legendEl.innerHTML = `<div class="legend-title">${mode === "combined" ? "Combined" : mode === "air" ? "Airspace" : "Population"} Layer</div>${rows}`;
    }

    function showLoadError(error) {
      statusEl.textContent = "Risk grid failed to load.";
      const errorControl = L.control({ position: "bottomleft" });
      errorControl.onAdd = function() {
        const div = L.DomUtil.create("div", "error-box");
        div.textContent = `Unable to load ${GRID_URL}. Serve the project with python -m http.server and open /html/map_airspace_compare.html.`;
        return div;
      };
      errorControl.addTo(map);
      console.error(error);
    }

    function toLocalXY(point, lat0) {
      return {
        x: point.lon * METERS_PER_DEG_LAT * Math.cos(lat0 * Math.PI / 180),
        y: point.lat * METERS_PER_DEG_LAT
      };
    }

    function fromLocalXY(point, lat0) {
      return {
        lon: point.x / (METERS_PER_DEG_LAT * Math.cos(lat0 * Math.PI / 180)),
        lat: point.y / METERS_PER_DEG_LAT
      };
    }

    function choosePoint(points, selector) {
      return points.reduce((best, point) => {
        if (!best) return point;
        return selector(point, best) ? point : best;
      }, null);
    }

    function circleIntersections(centerA, radiusA, centerB, radiusB) {
      const lat0 = (centerA.lat + centerB.lat) / 2;
      const a = toLocalXY(centerA, lat0);
      const b = toLocalXY(centerB, lat0);
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const d = Math.hypot(dx, dy);
      if (!d || d > radiusA + radiusB || d < Math.abs(radiusA - radiusB)) {
        return [];
      }

      const distanceToChord = ((radiusA * radiusA) - (radiusB * radiusB) + (d * d)) / (2 * d);
      const halfChord = Math.sqrt(Math.max(0, (radiusA * radiusA) - (distanceToChord * distanceToChord)));
      const ux = dx / d;
      const uy = dy / d;
      const px = a.x + (distanceToChord * ux);
      const py = a.y + (distanceToChord * uy);

      const intersection1 = fromLocalXY({
        x: px + (-uy * halfChord),
        y: py + (ux * halfChord)
      }, lat0);

      const intersection2 = fromLocalXY({
        x: px - (-uy * halfChord),
        y: py - (ux * halfChord)
      }, lat0);

      return [intersection1, intersection2];
    }

    function eastLineCircleIntersection(startPoint, center, radiusMeters) {
      const lat0 = (startPoint.lat + center.lat) / 2;
      const start = toLocalXY(startPoint, lat0);
      const c = toLocalXY(center, lat0);
      const dy = start.y - c.y;
      const inside = (radiusMeters * radiusMeters) - (dy * dy);
      if (inside < 0) return null;
      const dx = Math.sqrt(inside);
      const candidate1 = fromLocalXY({ x: c.x + dx, y: start.y }, lat0);
      const candidate2 = fromLocalXY({ x: c.x - dx, y: start.y }, lat0);
      return candidate1.lon > candidate2.lon ? candidate1 : candidate2;
    }

    function bearingDegrees(center, point) {
      const lat1 = center.lat * Math.PI / 180;
      const lat2 = point.lat * Math.PI / 180;
      const dLon = (point.lon - center.lon) * Math.PI / 180;
      const y = Math.sin(dLon) * Math.cos(lat2);
      const x = (Math.cos(lat1) * Math.sin(lat2)) - (Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon));
      return ((Math.atan2(y, x) * 180 / Math.PI) + 360) % 360;
    }

    function destinationPoint(center, radiusMeters, bearingDeg) {
      const earthRadius = 6371000;
      const bearing = bearingDeg * Math.PI / 180;
      const lat1 = center.lat * Math.PI / 180;
      const lon1 = center.lon * Math.PI / 180;
      const angularDistance = radiusMeters / earthRadius;

      const lat2 = Math.asin(
        (Math.sin(lat1) * Math.cos(angularDistance)) +
        (Math.cos(lat1) * Math.sin(angularDistance) * Math.cos(bearing))
      );

      const lon2 = lon1 + Math.atan2(
        Math.sin(bearing) * Math.sin(angularDistance) * Math.cos(lat1),
        Math.cos(angularDistance) - (Math.sin(lat1) * Math.sin(lat2))
      );

      return {
        lat: lat2 * 180 / Math.PI,
        lon: lon2 * 180 / Math.PI
      };
    }

    function circleArc(center, radiusMeters, startPoint, endPoint, direction, steps = 64) {
      const startBearing = bearingDegrees(center, startPoint);
      const endBearing = bearingDegrees(center, endPoint);
      let totalSweep;

      if (direction === "cw") {
        totalSweep = endBearing >= startBearing ? endBearing - startBearing : (360 - startBearing) + endBearing;
      } else {
        totalSweep = startBearing >= endBearing ? startBearing - endBearing : startBearing + (360 - endBearing);
      }

      const points = [];
      for (let i = 0; i <= steps; i += 1) {
        const fraction = i / steps;
        const bearing = direction === "cw"
          ? (startBearing + (totalSweep * fraction)) % 360
          : (startBearing - (totalSweep * fraction) + 360) % 360;
        const point = destinationPoint(center, radiusMeters, bearing);
        points.push([point.lat, point.lon]);
      }
      return points;
    }

    function ringLabelLatLng(lat, lon, radiusMeters) {
      return [lat + (radiusMeters / METERS_PER_DEG_LAT), lon];
    }

    function makeRingLabel(text, lat, lon, radiusMeters) {
      return L.marker(ringLabelLatLng(lat, lon, radiusMeters), {
        interactive: false,
        icon: L.divIcon({
          className: "",
          html: `<span class="ring-label">${text}</span>`,
          iconSize: null
        })
      });
    }

    function circlePolygon(center, radiusMeters, steps = 96) {
      return Array.from({ length: steps }, (_, index) => {
        const point = destinationPoint(center, radiusMeters, (360 * index) / steps);
        return [point.lat, point.lon];
      });
    }

    function sectorPolygon(center, radiusMeters, startBearing, endBearing, steps = 32) {
      const finalBearing = endBearing < startBearing ? endBearing + 360 : endBearing;
      const arc = Array.from({ length: steps + 1 }, (_, index) => {
        const bearing = (startBearing + ((finalBearing - startBearing) * (index / steps))) % 360;
        const point = destinationPoint(center, radiusMeters, bearing);
        return [point.lat, point.lon];
      });
      return [[center.lat, center.lon], ...arc, [center.lat, center.lon]];
    }

    function buildChicagoClassBShelfLayer() {
      const poo = faaRef.ordPoo;
      const mdw = faaRef.mdwLegal;
      const lewis = { lat: 41.60690586957971, lon: -88.09526487573747 };
      const poo5 = 5 * NM_TO_METERS;
      const poo6 = 6 * NM_TO_METERS;
      const poo10 = 10 * NM_TO_METERS;
      const poo10_5 = 10.5 * NM_TO_METERS;
      const mdw5 = 5 * NM_TO_METERS;
      const mdw10 = 10 * NM_TO_METERS;
      const lewis4_1 = 4.1 * NM_TO_METERS;

      const areaAStart = { lat: 42.0694444444, lon: -87.9252777778 };
      const areaAEastArc = { lat: 41.9875000000, lon: -87.7930555556 };
      const areaAEastLine = { lat: 41.9875000000, lon: -87.7708333333 };
      const areaAI290South = { lat: 41.9533333333, lon: -88.0322222222 };
      const areaAI290North = { lat: 42.0222222222, lon: -88.0308333333 };
      const areaAUs12 = { lat: 42.0841666667, lon: -87.9405555556 };

      const areaA5Arc = circleArc(poo, poo5, areaAStart, areaAEastArc, "cw", 28);
      const areaA6ArcSouth = circleArc(poo, poo6, areaAEastLine, areaAI290South, "cw", 40);
      const areaA6ArcNorth = circleArc(poo, poo6, areaAI290North, areaAUs12, "cw", 22);
      const areaAPoints = [
        [areaAStart.lat, areaAStart.lon],
        ...areaA5Arc.slice(1),
        [areaAEastLine.lat, areaAEastLine.lon],
        ...areaA6ArcSouth.slice(1),
        [areaAI290North.lat, areaAI290North.lon],
        ...areaA6ArcNorth.slice(1)
      ];

      const areaBStart = { lat: 42.0658333333, lon: -87.8652777778 };
      const areaBWillow = { lat: 42.1055555556, lon: -87.8272222222 };
      const areaBWillowEast = { lat: 42.1011111111, lon: -87.7405555556 };
      const areaBMdw5On10 = { lat: 41.8261111111, lon: -87.8500000000 };
      const areaBMdw5On10_5 = { lat: 41.8163888889, lon: -87.8561111111 };
      const areaBMdw10On10_5 = { lat: 41.8197222222, lon: -87.9705555556 };
      const areaBMdw10On10 = { lat: 41.8277777778, lon: -87.9680555556 };
      const areaBUs12 = { lat: 42.1338888889, lon: -88.0122222222 };
      const areaBBackTo5 = { lat: 42.0694444444, lon: -87.9252777778 };

      const areaB10ArcEast = circleArc(poo, poo10, areaBWillowEast, areaBMdw5On10, "cw", 44);
      const areaBMdw5Arc = circleArc(mdw, mdw5, areaBMdw5On10, areaBMdw5On10_5, "ccw", 12);
      const areaB10_5Arc = circleArc(poo, poo10_5, areaBMdw5On10_5, areaBMdw10On10_5, "cw", 22);
      const areaBMdw10Arc = circleArc(mdw, mdw10, areaBMdw10On10_5, areaBMdw10On10, "cw", 14);
      const areaB10ArcWest = circleArc(poo, poo10, areaBMdw10On10, areaBUs12, "cw", 50);
      const areaB5Arc = circleArc(poo, poo5, areaBBackTo5, areaBStart, "cw", 10);
      const areaBPoints = [
        [areaBStart.lat, areaBStart.lon],
        [areaBWillow.lat, areaBWillow.lon],
        [areaBWillowEast.lat, areaBWillowEast.lon],
        ...areaB10ArcEast.slice(1),
        ...areaBMdw5Arc.slice(1),
        ...areaB10_5Arc.slice(1),
        ...areaBMdw10Arc.slice(1),
        ...areaB10ArcWest.slice(1),
        [areaBBackTo5.lat, areaBBackTo5.lon],
        ...areaB5Arc.slice(1)
      ];

      const shorelineNorth = { lat: 41.8691666667, lon: -87.6163888889 };
      const shorelineSouth = { lat: 41.7497222222, lon: -87.5350000000 };
      const mdwLakeEast = eastLineCircleIntersection(shorelineNorth, mdw, mdw10);
      const midwayShelfLand = [
        [areaBMdw5On10.lat, areaBMdw5On10.lon],
        [shorelineNorth.lat, shorelineNorth.lon],
        [shorelineSouth.lat, shorelineSouth.lon],
        ...circleArc(mdw, mdw10, shorelineSouth, areaBMdw10On10_5, "cw", 48).slice(1),
        ...circleArc(poo, poo10_5, areaBMdw10On10_5, areaBMdw5On10_5, "ccw", 22).slice(1),
        ...circleArc(mdw, mdw5, areaBMdw5On10_5, areaBMdw5On10, "ccw", 16).slice(1)
      ];
      const midwayShelfLake = [
        [shorelineNorth.lat, shorelineNorth.lon],
        [mdwLakeEast.lat, mdwLakeEast.lon],
        ...circleArc(mdw, mdw10, mdwLakeEast, shorelineSouth, "cw", 24).slice(1),
        [shorelineSouth.lat, shorelineSouth.lon]
      ];
      const lewisOuter = circlePolygon(lewis, lewis4_1, 128);
      const lewisCutout = sectorPolygon(lewis, lewis4_1, 322, 18, 28);

      const layers = [];

      layers.push(
        L.polygon(areaAPoints, {
          color: "#9f1239",
          weight: 2.8,
          opacity: 0.96,
          fillColor: "#fda4af",
          fillOpacity: 0.2
        }).bindPopup(
          `<b>Chicago Class B Area A</b><br>` +
          `Inner core footprint<br>` +
          `Surface to 10,000 MSL reference slice`
        )
      );

      layers.push(
        L.polygon(areaBPoints, {
          color: "#ea580c",
          weight: 2.8,
          opacity: 0.94,
          fillColor: "#fdba74",
          fillOpacity: 0.14
        }).bindPopup(
          `<b>Chicago Class B Area B</b><br>` +
          `Outer low-altitude shelf footprint<br>` +
          `Approximation from FAA legal points for visual comparison`
        )
      );

      layers.push(
        L.polygon(circlePolygon(mdw, mdw5, 96), {
          color: "#115e59",
          weight: 2.5,
          opacity: 0.96,
          fillColor: "#99f6e4",
          fillOpacity: 0.18
        }).bindPopup(
          `<b>Midway Core</b><br>` +
          `5 NM Class C core used in the current airspace model`
        )
      );

      layers.push(
        L.polygon(midwayShelfLand, {
          color: "#0f766e",
          weight: 2.5,
          opacity: 0.94,
          fillColor: "#5eead4",
          fillOpacity: 0.14
        }).bindPopup(
          `<b>Midway Shelf</b><br>` +
          `5-10 NM land portion with ORD Class B exclusion`
        )
      );

      layers.push(
        L.polygon(midwayShelfLake, {
          color: "#0284c7",
          weight: 2.5,
          opacity: 0.94,
          fillColor: "#7dd3fc",
          fillOpacity: 0.12
        }).bindPopup(
          `<b>Midway Lake Shelf</b><br>` +
          `5-10 NM lakefront shelf portion`
        )
      );

      layers.push(
        L.polygon([lewisOuter, lewisCutout], {
          color: "#a16207",
          weight: 2.6,
          opacity: 0.96,
          fillColor: "#fde68a",
          fillOpacity: 0.16,
          fillRule: "evenodd"
        }).bindPopup(
          `<b>Lewis University Airspace</b><br>` +
          `4.1 NM Class D with approximate Clow cutout`
        )
      );

      return L.layerGroup(layers);
    }

    const classBShelfLayer = buildChicagoClassBShelfLayer().addTo(map);

    L.control.layers(
      null,
      {
        "Reference route": referenceLayer,
        "Airports": airportLayer,
        "Class B shelf": classBShelfLayer
      },
      { collapsed: false, position: "topright" }
    ).addTo(map);

    document.getElementById("btnCombined").addEventListener("click", () => showGridLayer("combined"));
    document.getElementById("btnAir").addEventListener("click", () => showGridLayer("air"));
    document.getElementById("btnPop").addEventListener("click", () => showGridLayer("pop"));

    updateLegend(currentMode);

    fetch(GRID_URL)
      .then((response) => {
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
      })
      .then((data) => {
        const demotedCount = normalizeGridData(data);

        gridLayers = {
          combined: makeGridLayer(data, colorCombined),
          air: makeGridLayer(data, colorAirspace),
          pop: makeGridLayer(data, colorPopulation)
        };

        showGridLayer(currentMode);

        const bounds = gridLayers.combined.getBounds();
        if (bounds.isValid()) {
          map.fitBounds(bounds.pad(0.02), { animate: false });
        }

        const featureCount = (data.features || []).length.toLocaleString();
        statusEl.textContent = demotedCount > 0
          ? `${featureCount} cells loaded. Unified airspace overlay enabled. ${demotedCount.toLocaleString()} stale lab cells adjusted.`
          : `${featureCount} cells loaded. Unified airspace overlay enabled.`;
      })
      .catch(showLoadError);

    map.whenReady(() => {
      requestAnimationFrame(() => map.invalidateSize());
    });
  </script>
</body>
</html>
