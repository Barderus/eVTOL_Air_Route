<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Route Preview (Dijkstra vs A*)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100%; width: 100%; }

    /* Simple legend styling */
    .legend-box {
      background: white;
      padding: 10px 12px;
      border-radius: 8px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.2);
      font-family: Arial, sans-serif;
      font-size: 13px;
      line-height: 1.4;
    }
    .legend-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
    .swatch-line {
      width: 34px;
      height: 0;
      border-top: 4px solid #000;
      display: inline-block;
    }
    .swatch-dash {
      width: 34px;
      height: 0;
      border-top: 4px dashed #000;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
    // 1) Create map (Chicago-ish default view)
    const map = L.map("map").setView([41.88, -87.63], 10);

    // 2) Base tiles
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    // 3) Load routes GeoJSON (contains two features: dijkstra + astar)
    fetch("../graph/routes.geojson")
      .then(r => {
        if (!r.ok) throw new Error("Failed to load routes.geojson");
        return r.json();
      })
      .then(data => {

        const routeLayer = L.geoJSON(data, {
          style: function (feature) {
            const name = (feature.properties && feature.properties.name) ? feature.properties.name : "";

            if (name === "dijkstra") {
              return {
                color: "#1f77b4", // blue
                weight: 6,
                opacity: 0.9
              };
            }

            if (name === "astar") {
              return {
                color: "#d62728", // red
                weight: 6,
                opacity: 0.9,
                dashArray: "8 6"  // dashed
              };
            }

            // fallback
            return {
              color: "black",
              weight: 5,
              opacity: 0.9
            };
          },
          onEachFeature: function (feature, layer) {
            const name = feature.properties && feature.properties.name ? feature.properties.name : "route";
            layer.bindPopup(`<b>${name}</b>`);
          }
        }).addTo(map);

        // Zoom map to route bounds
        map.fitBounds(routeLayer.getBounds(), { padding: [20, 20] });

        // 4) Add a legend
        const legend = L.control({ position: "bottomright" });
        legend.onAdd = function () {
          const div = L.DomUtil.create("div", "legend-box");

          div.innerHTML = `
            <div style="font-weight:700; margin-bottom:6px;">Routes</div>
            <div class="legend-row">
              <span class="swatch-line" style="border-top-color:#1f77b4;"></span>
              <span>Dijkstra</span>
            </div>
            <div class="legend-row">
              <span class="swatch-dash" style="border-top-color:#d62728;"></span>
              <span>A*</span>
            </div>
          `;
          return div;
        };
        legend.addTo(map);

      })
      .catch(err => {
        console.error(err);
        alert(err.message + "\n\nTip: open this page via a local server (not file://).");
      });
  </script>
</body>
</html>
