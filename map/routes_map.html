<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Route Preview</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100%; width: 100%; }
  </style>
</head>
<body>
  <div id="map"></div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
    // 1) Create map (Chicago-ish default view)
    const map = L.map("map").setView([41.88, -87.63], 10);

    // 2) Base tiles
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    // 3) Load route GeoJSON
    fetch("../graph/route.geojson")
      .then(r => {
        if (!r.ok) throw new Error("Failed to load route.geojson");
        return r.json();
      })
      .then(data => {
        const routeLayer = L.geoJSON(data, {
          style: {
            // Leaflet polyline styling
            weight: 5,
            opacity: 0.9
          }
        }).addTo(map);

        // Zoom map to route bounds
        map.fitBounds(routeLayer.getBounds(), { padding: [20, 20] });
      })
      .catch(err => {
        console.error(err);
        alert(err.message + "\n\nTip: open this page via a local server (not file://).");
      });
  </script>
</body>
</html>
