<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Route Preview (Dijkstra vs A*)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.6.0/dist/leaflet.css"
    integrity="sha512-xwE/Az9zrjBIphAcBb3F6JVqxf46+CDLwfLMHloNu6KEQCAWi6HcDUbeOfBIptF7tcCzusKFjFw2yuvEpDL9wQ=="
    crossorigin=""
  />

  <style>
    :root {
      --surface: #ffffff;
      --surface-soft: #f5f7f8;
      --line: #cfd7dd;
      --text: #172026;
      --muted: #5f6f7a;
      --active: #165a72;
    }

    * { box-sizing: border-box; }

    html,
    body {
      height: 100%;
      margin: 0;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      background: var(--surface-soft);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
      z-index: 1000;
    }

    .title-block { min-width: 220px; }

    h1 {
      margin: 0;
      font-size: 17px;
      font-weight: 700;
      line-height: 1.2;
    }

    .status {
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
      white-space: nowrap;
    }

    .control-strip {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .segmented {
      display: inline-grid;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      overflow: hidden;
      background: var(--surface);
    }

    .route-toggle { grid-template-columns: repeat(2, minmax(96px, 1fr)); }

    .segmented button {
      min-width: 0;
      padding: 8px 12px;
      border: 0;
      border-right: 1px solid var(--line);
      color: var(--text);
      background: transparent;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
    }

    .segmented button:last-child { border-right: 0; }
    .segmented button:hover { background: #eef3f5; }
    .segmented button.active { color: #ffffff; background: var(--active); }

    #map {
      flex: 1 1 auto;
      width: 100%;
      height: calc(100vh - 59px);
      min-height: 360px;
    }

    .legend-box {
      background: white;
      padding: 10px 12px;
      border-radius: 7px;
      box-shadow: 0 6px 18px rgba(23, 32, 38, 0.14);
      font-family: Arial, sans-serif;
      font-size: 13px;
      line-height: 1.4;
    }
    .legend-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
    .swatch-line {
      width: 34px;
      height: 0;
      border-top: 4px solid #000;
      display: inline-block;
    }
    .swatch-dash {
      width: 34px;
      height: 0;
      border-top: 4px dashed #000;
      display: inline-block;
    }

    @media (max-width: 700px) {
      .toolbar { align-items: stretch; flex-direction: column; gap: 9px; }
      .status { white-space: normal; }
      .control-strip { justify-content: stretch; }
      .segmented { width: 100%; }
      .segmented button { padding-inline: 6px; font-size: 12px; }
      #map { height: calc(100vh - 132px); }
    }
  </style>
</head>
<body>
  <header class="toolbar">
    <div class="title-block">
      <h1>Route Preview (Dijkstra vs A*)</h1>
      <div id="status" class="status">Select a route mode.</div>
    </div>
    <div class="control-strip">
      <div class="segmented route-toggle" id="routeToggle" role="group" aria-label="Route mode"></div>
    </div>
  </header>
  <main id="map" aria-label="Dijkstra and A* route preview map"></main>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.6.0/dist/leaflet.js"
    integrity="sha512-gZwIG9x3wUXg2hdXF6+rVkLF/0Vi9U8D2Ntg4Ga5I5BZpVkVxlJWbSQtXPSiUTtC0TjtGOmxa1AJPuV0CPthew=="
    crossorigin=""
  ></script>

  <script>
    const STUDY_BOUNDS = L.latLngBounds(
      [41.48, -88.34],
      [42.21, -87.52]
    );
    const map = L.map("map", {
      center: [41.84, -87.93],
      zoom: 10,
      maxBounds: STUDY_BOUNDS.pad(0.04),
      maxBoundsViscosity: 0.9
    });

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    const routeToggle = document.getElementById("routeToggle");
    const statusEl = document.getElementById("status");
    const routeLabels = {
      dijkstra: "Dijkstra",
      astar: "A*"
    };
    let activeRouteName = "dijkstra";

    fetch("../graph/routes.geojson")
      .then(r => {
        if (!r.ok) throw new Error("Failed to load routes.geojson");
        return r.json();
      })
      .then(data => {
        const routeLayers = {};
        const routeOrder = [];

        data.features.forEach((feature) => {
          const p = feature.properties || {};
          const name = p.name || "route";
          const label = routeLabels[name] || name;
          const layer = L.geoJSON(feature, {
            style: function () {
              if (name === "dijkstra") {
                return { color: "#1f77b4", weight: 6, opacity: 0.9 };
              }

              if (name === "astar") {
                return { color: "#d62728", weight: 6, opacity: 0.9, dashArray: "8 6" };
              }

              return { color: "black", weight: 5, opacity: 0.9 };
            },
            onEachFeature: function (_feature, routeLayer) {
              routeLayer.bindPopup(`<b>${label}</b>`);
            }
          });
          routeLayers[name] = layer;
          routeOrder.push({ name, label });
        });

        map.fitBounds(STUDY_BOUNDS, { padding: [20, 20] });

        function showRoute(routeName) {
          activeRouteName = routeName;
          Object.entries(routeLayers).forEach(([name, layer]) => {
            if (name === routeName) {
              layer.addTo(map);
            } else {
              map.removeLayer(layer);
            }
          });

          Array.from(routeToggle.querySelectorAll("button")).forEach((button) => {
            button.classList.toggle("active", button.dataset.route === routeName);
          });

          const activeRoute = routeOrder.find((route) => route.name === routeName);
          if (statusEl && activeRoute) {
            statusEl.textContent = activeRoute.label + " route selected";
          }
        }

        routeOrder.forEach((route) => {
          const button = document.createElement("button");
          button.type = "button";
          button.dataset.route = route.name;
          button.textContent = route.label;
          button.addEventListener("click", () => showRoute(route.name));
          routeToggle.appendChild(button);
        });

        showRoute(routeLayers[activeRouteName] ? activeRouteName : routeOrder[0].name);

        const legend = L.control({ position: "bottomright" });
        legend.onAdd = function () {
          const div = L.DomUtil.create("div", "legend-box");

          div.innerHTML = `
            <div style="font-weight:700; margin-bottom:6px;">Routes</div>
            <div class="legend-row">
              <span class="swatch-line" style="border-top-color:#1f77b4;"></span>
              <span>Dijkstra</span>
            </div>
            <div class="legend-row">
              <span class="swatch-dash" style="border-top-color:#d62728;"></span>
              <span>A*</span>
            </div>
          `;
          return div;
        };
        legend.addTo(map);

      })
      .catch(err => {
        console.error(err);
        alert(err.message + "\n\nTip: open this page via a local server (not file://).");
      });
  </script>
</body>
</html>
